<!doctype html><html lang="fa" dir="rtl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Admin Login</title><link rel="stylesheet" href="/admin-login.css"/></head><body>
<main class="login-shell">
  <section class="login-card">
    <h2 id="loginTitle">ورود امن مدیریت</h2>
    <form id="loginForm" class="grid2">
      <label><span id="usernameLabel">نام کاربری</span><input name="username" required/></label>
      <label><span id="passwordLabel">رمز عبور</span><input name="password" type="password" required/></label>
      <label class="full captcha-inline"><div class="row"><button id="refreshCaptcha" type="button" class="chip">↻</button><input name="captcha" placeholder="Enter captcha" required/><code id="captchaText">------</code></div></label>
      <button class="btn-primary full" id="loginBtn" type="submit">ورود</button>
    </form>
    <p id="loginStatus" class="status"></p>
    <div class="lang-row"><button id="langToggle" class="chip">EN</button></div>
  </section>
  <aside class="login-art"><div class="logo-dot">⏱</div><h2 id="welcomeTitle">خوش آمدید</h2><p id="welcomeDesc">برای دسترسی به پنل مدیریت هوشمند زمان وارد شوید و تنظیمات پروژه را یکپارچه کنترل کنید.</p></aside>
</main>
<script type="module" src="/admin-login.js"></script></body></html>
