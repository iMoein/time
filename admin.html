<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="/admin.css" />
</head>
<body>
  <div class="admin-layout auth-mode" id="appShell">
    <aside id="dashSidebar" class="sidebar hidden">
      <h2>Time Admin</h2>
      <button class="nav-btn active" data-tab="overview">نمای کلی</button>
      <button class="nav-btn" data-tab="defaults">پیش‌فرض‌ها</button>
      <button class="nav-btn" data-tab="ntp">NTP</button>
      <button class="nav-btn" data-tab="json">JSON</button>
      <div class="side-bottom"><button id="langToggle" class="chip">EN</button><button id="logoutBtn" class="chip danger">خروج</button></div>
    </aside>

    <main class="main-panel">
      <header id="dashHeader" class="topbar hidden"><h1 id="title">مدیریت هوشمند زمان</h1></header>

      <section id="loginCard" class="login-shell card">
        <div class="login-art"><div class="logo-dot">⏱</div><h2 id="welcomeTitle">خوش آمدید</h2><p id="welcomeDesc">برای دسترسی به پنل مدیریت هوشمند زمان وارد شوید و تنظیمات پروژه را یکپارچه کنترل کنید.</p></div>
        <div class="login-form-wrap"><h2 id="loginTitle">ورود امن مدیریت</h2><p id="firstLoginNote" class="note hidden"></p><form id="loginForm" class="grid2 login-grid"><label><span id="usernameLabel">نام کاربری</span><input name="username" required /></label><label><span id="passwordLabel">رمز عبور</span><input name="password" type="password" required /></label><label class="full captcha-inline"><div class="row"><code id="captchaText">------</code><input name="captcha" placeholder="Enter captcha" required /><button id="refreshCaptcha" type="button" class="chip">↻</button></div></label><button class="btn-primary full" id="loginBtn" type="submit">ورود</button></form><p id="loginStatus" class="status"></p></div>
      </section>

      <section id="dashboard" class="hidden">
        <section id="forcePasswordCard" class="card hidden"><h3 id="passwordTitle">تغییر رمز اولیه</h3><p id="forcePasswordInfo" class="note"></p><form id="passwordForm" class="grid2"><label><span id="newPasswordLabel">رمز جدید</span><input id="newPassword" type="password" required minlength="8" /></label><label><span id="confirmPasswordLabel">تکرار رمز</span><input id="confirmPassword" type="password" required minlength="8" /></label><button class="btn-primary full" id="passwordSaveBtn" type="submit">ذخیره رمز</button></form><p id="passwordStatus" class="status"></p></section>
        <div id="dashboardContent" class="hidden tabs">
          <section id="tab-overview" class="tab active"><div class="cards"><article class="metric card"><h4>فایل‌های JSON</h4><strong id="metricJson">-</strong></article><article class="metric card"><h4>شهرهای پیش‌فرض</h4><strong id="metricCities">-</strong></article><article class="metric card"><h4>NTP Host</h4><strong id="metricNtp">-</strong></article></div></section>
          <section id="tab-defaults" class="tab"><section class="card"><h3 id="defaultsTitle">پیش‌فرض‌های برنامه</h3><div class="grid2"><label class="full"><span>جستجو و افزودن شهر</span><div class="row"><input id="citySearchInput" placeholder="tehran, london, tokyo" /><button id="cityAddBtn" type="button" class="chip">افزودن</button></div><div id="citySuggestions" class="suggestions"></div></label><div id="defaultCityChips" class="chips full"></div><label><span id="defaultSelectedCityLabel">شهر اولیه</span><select id="defaultSelectedCityInput"></select></label><label><span id="defaultOccasionsLabel">فیلتر مناسبت‌ها</span><select id="occasionSelect" multiple size="6"></select></label></div><button id="defaultsSaveBtn" class="btn-primary">ذخیره پیش‌فرض‌ها</button><p id="defaultsStatus" class="status"></p></section></section>
          <section id="tab-ntp" class="tab"><section class="card"><h3 id="ntpTitle">تنظیمات NTP</h3><label><span>سرورهای آماده</span><select id="ntpPreset"></select></label><label><span>سرور سفارشی</span><input id="ntpHost" placeholder="pool.ntp.org" /></label><div class="row"><button id="ntpSaveBtn" class="btn-primary">ذخیره</button><button id="ntpTestBtn" class="chip">همگام‌سازی</button></div><div class="stats"><article><small>سرور</small><strong id="ntpHostLabel">-</strong></article><article><small>تاخیر</small><strong id="ntpDelay">-</strong></article></div><p id="ntpStatus" class="status"></p></section></section>
          <section id="tab-json" class="tab"><section class="card"><h3 id="jsonTitle">مدیریت JSON</h3><div class="row"><select id="jsonFileSelect"></select><button id="jsonLoadBtn" class="chip">بارگذاری</button><button id="jsonSaveBtn" class="btn-primary">ذخیره</button></div><textarea id="jsonEditor" spellcheck="false"></textarea><p id="jsonStatus" class="status"></p></section></section>
        </div>
      </section>
    </main>
  </div>
  <script type="module" src="/admin.js"></script>
</body>
</html>
